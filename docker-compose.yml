services:
    backend:
        image: python:3.12-slim
        working_dir: /app
        volumes:
            - ./backend:/app
            - gitvise-data:/data
        ports:
            - "3001:3001"
        environment:
            - PORT=3001
            - DATA_DIR=/data
            - FRONTEND_ORIGIN=http://localhost:3000
            - PLUGINS_DIR=/app/plugins
        command: >
            sh -c "pip install -r requirements.txt -q && uvicorn main:app --host 0.0.0.0 --port 3001 --reload"
        restart: unless-stopped

    frontend:
        image: node:22-alpine
        working_dir: /repo
        volumes:
            - ./:/repo
            - /repo/node_modules
            - /repo/frontend/node_modules
            - /repo/frontend/.next
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=development
            - NEXT_PUBLIC_API_URL=http://localhost:3001
        command: sh -c "npm install && npm run dev -w frontend"
        depends_on:
            - backend
        restart: unless-stopped

volumes:
    gitvise-data:
