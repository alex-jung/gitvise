services:
  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
    restart: unless-stopped

  landing:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/landing:/app
      - landing_node_modules:/app/node_modules
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --port 3002"
    profiles:
      - landing
    restart: unless-stopped

volumes:
  api_node_modules:
  web_node_modules:
  landing_node_modules:
