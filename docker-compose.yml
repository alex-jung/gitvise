services:
  api:
    image: node:22-alpine
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    volumes:
      - ./apps/api:/app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

  web:
    image: node:22-alpine
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    volumes:
      - ./apps/web:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
    restart: unless-stopped

  landing:
    image: node:22-alpine
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    volumes:
      - ./apps/landing:/app
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --port 3002"
    profiles:
      - landing
    restart: unless-stopped
